services:
  - type: web
    name: cryptobot-delta
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: RENDER_EXTERNAL_URL
        fromRenderService:
          type: pserv
          name: cryptobot-delta
          property: host
